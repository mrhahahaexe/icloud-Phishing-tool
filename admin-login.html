<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - iCloud Clone</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div id="container">
        <div id="inndiv">
            <h2 class="mb-4">Admin Dashboard Login</h2>
            
            <form id="adminLoginForm" class="w-100">
                <div class="form-floating mb-3">
                    <input type="text" class="form-control" id="adminUsername" placeholder="Username" required>
                    <label for="adminUsername">Username</label>
                </div>

                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="adminPassword" placeholder="Password" required>
                    <label for="adminPassword">Password</label>
                </div>

                <button type="submit" class="login-btn">Secure Login</button>
            </form>

            <div class="mt-4">
                <a href="/" style="color: var(--text-secondary); text-decoration: none; font-size: 14px;">← Back to Main Page</a>
            </div>
        </div>
    </div>

    <script type="module">
        // Using Vite environment variables for security
        const ADMIN_USER = import.meta.env.VITE_ADMIN_USERNAME;
        const ADMIN_PASS = import.meta.env.VITE_ADMIN_PASSWORD;

        document.getElementById('adminLoginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const username = document.getElementById('adminUsername').value;
            const password = document.getElementById('adminPassword').value;
            
            if (username === ADMIN_USER && password === ADMIN_PASS) {
                localStorage.setItem('isAdminLoggedIn', 'true');
                window.location.href = '/admin.html';
            } else {
                alert('Invalid admin credentials.');
            }
        });
    </script>


</body>
</html>
